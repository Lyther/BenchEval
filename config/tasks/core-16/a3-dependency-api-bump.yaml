  budget_class: "B2"
  max_steps: 20
  max_wall_clock_sec: 300
  max_cost_usd: 2.00
  must_not_modify_tests: true

verification:
  mode: "deterministic"
  verifier: "verify.py"
  replay_required: true
  primary_pass_metric: "pass"
  partial_metrics:
    - "migration_identified"
    - "lockfile_pin_correct"
    - "compatibility_fixes_apply"
    - "visible_tests_pass"
    - "hidden_integration_pass"
