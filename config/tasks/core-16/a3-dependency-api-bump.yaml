  intent: "Adapt application code to a minor breaking change in a vendored stub dependency."

provenance:
  source_type: "internal"
  license: "internal"
  spdx: "LicenseRef-Internal"
  source_hash: "sha256:1edc80539e8a3023dbb1dd62ffbfc9e50918b4f128d9b4995af61cf7b2a0de58"
