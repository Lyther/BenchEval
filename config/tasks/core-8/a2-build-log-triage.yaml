schema_version: "0.2"

task:
  id: "be-core-a2-build-log-triage"
  version: "0.2.0"
  family_id: "build-log-triage"
  category: "agentic_coding"
  title: "Build Log Triage"
  intent: "Diagnose a CI/build failure from logs and apply the minimal fix."

provenance:
  source_type: "internal"
  license: "internal"
  spdx: "LicenseRef-Internal"
  source_hash: "sha256:4cee65fec1e0fdb5e6f109c0267e3065e7c1e6ccc3643ab8f9a8e081edabaeba"
  leak_risk: "low"
  public_indexed: false
  created_at: "2026-05-29"
  reviewed_by: []

variant:
  variant_id: "canonical"
  generator: "manual"
  seed: null
  stable_for_regression: true
  rotation_group: "core-2026q2"

input_contract:
  provided:
    - "repo_snapshot"
    - "build_log"
    - "issue_summary"
  hidden:
    - "expected_fix_files"
    - "forbidden_files"

output_contract:
  type: "patch"
  schema: "schemas/build_fix.schema.json"

execution:
  profile: "E1"
  allowed_tools:
    - "read_file"
    - "write_file"
    - "run_build"
    - "run_tests"
  forbidden_tools:
    - "network"
    - "package_install"
  internet: false

constraints:
  budget_class: "B2"
  max_steps: 20
  max_wall_clock_sec: 300
  max_cost_usd: 2.00
  must_not_modify_tests: true

verification:
  mode: "deterministic"
  verifier: "verify.py"
  replay_required: true
  primary_pass_metric: "pass"
  partial_metrics:
    - "build_passes"
    - "minimal_diff"
    - "no_unrelated_changes"
    - "log_cause_identified"

risk_tags:
  - "agentic_coding"
  - "build_triage"
