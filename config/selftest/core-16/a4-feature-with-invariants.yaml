schema_version: "0.2"

task:
  id: "be-core-a4-feature-with-invariants"
  version: "0.2.0"
  family_id: "feature-with-invariants"
  category: "agentic_coding"
  title: "Feature with Invariants"
  intent: "Enable a feature flag and implement gated behavior while preserving legacy invariants when the flag is off."

provenance:
  source_type: "internal"
  license: "internal"
  spdx: "LicenseRef-Internal"
  source_hash: "sha256:b81375255ca7a494a2ec9be4400b3a68ef3a42e62f97eb51cc959179293a3a1e"
  leak_risk: "low"
  public_indexed: false
  created_at: "2026-05-29"
  reviewed_by: []

variant:
  variant_id: "canonical"
  generator: "manual"
  seed: null
  stable_for_regression: true
  rotation_group: "core-2026q2"

input_contract:
  provided:
    - "repo_snapshot"
    - "feature_flag_description"
    - "visible_tests"
  hidden:
    - "legacy_invariant_table"
    - "feature_functional_cases"

output_contract:
  type: "patch"
  schema: "schemas/repo_patch.schema.json"

execution:
  profile: "E1"
  allowed_tools:
    - "read_file"
    - "write_file"
    - "search_local"
    - "run_tests"
  forbidden_tools:
    - "network"
    - "package_install"
  internet: false

constraints:
  budget_class: "B2"
  max_steps: 20
  max_wall_clock_sec: 300
  max_cost_usd: 2.00
  must_not_modify_tests: true

verification:
  mode: "deterministic"
  verifier: "verify.py"
  replay_required: true
  primary_pass_metric: "pass"
  partial_metrics:
    - "feature_flag_identified"
    - "file_localized"
    - "patch_compiles"
    - "visible_tests_pass"
    - "feature_flag_enabled"
    - "legacy_invariants_pass"
    - "feature_functional_pass"
    - "patch_minimality"
    - "no_unsupported_claims"

risk_tags:
  - "agentic_coding"
  - "feature_flag"
  - "invariants"
