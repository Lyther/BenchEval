schema_version: "0.2"

task:
  id: "be-core-a1-multi-file-repo-fix"
  version: "0.2.0"
  family_id: "multi-file-repo-fix"
  category: "agentic_coding"
  title: "Multi-File Repo Fix"
  intent: "Locate and patch a bug spanning multiple files in a small repository."

provenance:
  source_type: "internal"
  license: "internal"
  spdx: "LicenseRef-Internal"
  source_hash: "sha256:aacad13140d8f63172aef665ae10fc76af5a5f5ed996626f953a1b59f5443dc9"
  leak_risk: "low"
  public_indexed: false
  created_at: "2026-05-29"
  reviewed_by: []

variant:
  variant_id: "canonical"
  generator: "manual"
  seed: null
  stable_for_regression: true
  rotation_group: "core-2026q2"

input_contract:
  provided:
    - "repo_snapshot"
    - "issue_description"
    - "visible_tests"
  hidden:
    - "hidden_integration_tests"
    - "accepted_root_cause_ids"

output_contract:
  type: "patch"
  schema: "schemas/repo_patch.schema.json"

execution:
  profile: "E1"
  allowed_tools:
    - "read_file"
    - "write_file"
    - "search_local"
    - "run_tests"
  forbidden_tools:
    - "network"
    - "package_install"
  internet: false

constraints:
  budget_class: "B2"
  max_steps: 20
  max_wall_clock_sec: 300
  max_cost_usd: 2.00
  must_not_modify_tests: true

verification:
  mode: "deterministic"
  verifier: "verify.py"
  replay_required: true
  primary_pass_metric: "pass"
  partial_metrics:
    - "file_localized"
    - "root_cause_identified"
    - "patch_compiles"
    - "hidden_tests_pass"
    - "patch_minimality"
    - "no_unsupported_claims"

risk_tags:
  - "agentic_coding"
  - "multi_file"
