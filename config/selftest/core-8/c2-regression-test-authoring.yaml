schema_version: "0.2"

task:
  id: "be-core-c2-regression-test-authoring"
  version: "0.2.0"
  family_id: "regression-test-authoring"
  category: "coding"
  title: "Regression Test Authoring"
  intent: "Author a failing regression test for a described bug before any fix is applied."

provenance:
  source_type: "synthetic"
  license: "internal"
  spdx: "LicenseRef-Internal"
  source_hash: "sha256:4710556a69dd8ed37ef33bb80337b4f18ac78590b1265462045b31855dbb80b8"
  leak_risk: "low"
  public_indexed: false
  created_at: "2026-05-29"
  reviewed_by: []

variant:
  variant_id: "canonical"
  generator: "manual"
  seed: null
  stable_for_regression: true
  rotation_group: "core-2026q2"

input_contract:
  provided:
    - "source_module"
    - "bug_description"
    - "test_harness"
  hidden:
    - "gold_patch"
    - "hidden_regression_cases"

output_contract:
  type: "artifact"
  schema: "schemas/regression_test.schema.json"

execution:
  profile: "E1"
  allowed_tools:
    - "read_file"
    - "write_file"
    - "run_tests"
  forbidden_tools:
    - "network"
    - "package_install"
  internet: false

constraints:
  budget_class: "B1"
  max_steps: 10
  max_wall_clock_sec: 180
  max_cost_usd: 0.25
  must_not_modify_tests: false

verification:
  mode: "deterministic"
  verifier: "verify.py"
  replay_required: true
  primary_pass_metric: "pass"
  partial_metrics:
    - "test_fails_before_gold_patch"
    - "test_passes_after_gold_patch"

risk_tags:
  - "coding"
  - "regression_coverage"
